name: Build Talk Tool App and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flet pyperclip pyinstaller

      - name: Build for macOS
        if: runner.os == 'macOS'
        run: |
          # 执行Flet打包（显式指定--onedir模式，可选，也可保留单文件）
          flet pack talk_tool.py --product-name "AI Talk Tool" --icon app.icns
          # 列出dist目录内容，确认产物（调试用）
          echo "=== macOS dist目录内容 ==="
          ls -la dist/
          # 切换到dist目录，打包实际生成的单文件
          cd dist
          # 产物是talk_tool单文件，打包为zip
          zip -r "AI_Talk_Tool_macOS.zip" talk_tool

      - name: Build for Windows
        if: runner.os == 'Windows'
        run: |
          flet pack talk_tool.py --product-name "AI Talk Tool" --icon app.ico
          echo "=== Windows dist目录内容 ==="
          dir dist
          cd dist
          powershell Compress-Archive -Path "AI Talk Tool" -DestinationPath "AI_Talk_Tool_Windows.zip"

      - name: Build for Linux
        if: runner.os == 'Linux'
        run: |
          flet pack talk_tool.py --product-name "AI Talk Tool" --icon app.png
          echo "=== Linux dist目录内容 ==="
          ls -la dist/
          cd dist
          zip -r "AI_Talk_Tool_Linux.zip" "AI Talk Tool"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-build
          path: dist/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts

      - name: List Downloaded Files (Debug)
        run: ls -R ./release-artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-artifacts/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}