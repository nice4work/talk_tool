name: Build Talk Tool App and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flet pyperclip pyinstaller

      # --- macOS 构建 ---
      - name: Build for macOS
        if: runner.os == 'macOS'
        run: |
          echo "🛠 Starting macOS build..."
          # macOS 不支持 --onedir，直接运行即可，默认生成 .app
          flet pack talk_tool.py --product-name "AI Talk Tool" --icon app.icns
          
          echo "📂 Contents of dist directory:"
          ls -la dist/
          
          cd dist
          
          # 自动查找 .app 文件 (通常名字是 Product Name.app 或 talk_tool.app)
          # 使用通配符查找第一个 .app 文件
          APP_FILE=$(ls -d *.app 2>/dev/null | head -n 1)
          
          if [ -z "$APP_FILE" ]; then
            echo "❌ Error: No .app file found in dist!"
            ls -la
            exit 1
          fi
          
          echo "✅ Found app file: $APP_FILE"
          
          # 重命名以便统一
          mv "$APP_FILE" "AI_Talk_Tool_macOS.app"
          zip -r "AI_Talk_Tool_macOS.zip" "AI_Talk_Tool_macOS.app"
          
          echo "✅ macOS zip created."
          ls -la *.zip

      # --- Windows 构建 ---
      - name: Build for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "🛠 Starting Windows build..."
          # Windows 默认生成文件夹，无需 --onedir 参数（加了可能报错或无效，视版本而定，去掉最稳）
          flet pack talk_tool.py --product-name "AI Talk Tool" --icon app.ico
          
          Write-Host "📂 Contents of dist directory:"
          Get-ChildItem -Path dist | Format-Table
          
          cd dist
          
          # 自动查找生成的文件夹 (排除 __pycache__ 等)
          # 通常是一个以产品名命名的文件夹，或者 talk_tool 文件夹
          $folders = Get-ChildItem -Directory | Where-Object { $_.Name -notlike "__pycache__" }
          
          if ($folders.Count -eq 0) {
            # 如果没找到文件夹，找 exe (单文件模式)
            $exe = Get-ChildItem -Filter "*.exe" | Select-Object -First 1
            if ($exe) {
              Compress-Archive -Path $exe.FullName -DestinationPath "AI_Talk_Tool_Windows.zip" -Force
              Write-Host "✅ Created zip from exe: $($exe.Name)"
            } else {
              Write-Host "❌ Error: No folder or exe found in dist!"
              Get-ChildItem
              exit 1
            }
          } else {
            # 取第一个符合条件的文件夹
            $targetFolder = $folders[0]
            Write-Host "✅ Found folder: $($targetFolder.Name)"
            Compress-Archive -Path $targetFolder.FullName -DestinationPath "AI_Talk_Tool_Windows.zip" -Force
          }
          
          Get-ChildItem *.zip

      # --- Linux 构建 ---
      - name: Build for Linux
        if: runner.os == 'Linux'
        run: |
          echo "🛠 Starting Linux build..."
          # Linux 默认生成文件夹
          flet pack talk_tool.py --product-name "AI Talk Tool" --icon app.png
          
          echo "📂 Contents of dist directory:"
          ls -la dist/
          
          cd dist
          
          # 自动查找生成的文件夹
          TARGET_DIR=$(ls -d */ 2>/dev/null | grep -v "__pycache__" | head -n 1 | xargs)
          
          if [ -z "$TARGET_DIR" ]; then
             # 没找到文件夹，找可执行文件
             BIN_FILE=$(ls -t talk_tool 2>/dev/null | head -n 1)
             if [ -f "$BIN_FILE" ]; then
               zip "AI_Talk_Tool_Linux.zip" "$BIN_FILE"
               echo "✅ Created zip from binary: $BIN_FILE"
             else
               echo "❌ Error: No folder or binary found in dist!"
               ls -la
               exit 1
             fi
          else
            # 去除末尾斜杠
            TARGET_DIR=${TARGET_DIR%/}
            echo "✅ Found folder: $TARGET_DIR"
            zip -r "AI_Talk_Tool_Linux.zip" "$TARGET_DIR"
          fi
          
          echo "✅ Linux zip created."
          ls -la *.zip

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-build
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts
          merge-multiple: true

      - name: List Downloaded Files
        run: |
          echo "📂 Files ready for release:"
          ls -la ./release-artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}